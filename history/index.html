<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment History</title>
  <link rel="stylesheet" href="history.css">
</head>

<body>

  <div class="container">

    <h1>Payment History</h1>

    <div class="filters">
      <button onclick="filterPayments('all')">All</button>
      <button onclick="filterPayments('success')">Successful</button>
      <button onclick="filterPayments('failed')">Failed</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Reference</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody id="historyTable"></tbody>
    </table>

  </div>

  <script src="history.js"></script>
</body>
</html>
