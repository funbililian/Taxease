<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Taxease Registration</title>

  <!-- CSS -->
  <link rel="stylesheet" href="register.css">

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ================= CONTAINER ================= -->

  <section class="register-section">

    <div class="register-container">

      <!-- LEFT SIDE -->

      <div class="register-left">

        <div class="logo-area">

          <img src="https://res.cloudinary.com/dmtbsxz67/image/upload/v1780010677/Screenshot_20260528_235724_Figma_zqpyn9.jpg" alt="Logo">

          <h1>Taxease</h1>

        </div>

        <h2>Create Your Account</h2>

        <p>
          Join Taxease and start calculating and managing your taxes easily and securely.
        </p>

      </div>

      <!-- RIGHT SIDE -->

      <div class="register-right">

        <form id="registerForm">

          <h2>Sign In</h2>

          <!-- FULL NAME -->

          <div class="input-group">

            <label>Full Name</label>

            <input
              type="text"
              id="fullName"
              placeholder="Enter your full name"
            >

          </div>

          <!-- EMAIL -->

          <div class="input-group">

            <label>Email Address</label>

            <input
              type="email"
              id="email"
              placeholder="Enter your email"
            >

          </div>

          <!-- PHONE -->

          <div class="input-group">

            <label>Phone Number</label>

            <input
              type="tel"
              id="phone"
              placeholder="Enter your phone number"
            >

          </div>

          <!-- PASSWORD -->

          <div class="input-group">

            <label>Password</label>

            <input
              type="password"
              id="password"
              placeholder="Enter password"
            >

          </div>

          <!-- CONFIRM PASSWORD -->

          <div class="input-group">

            <label>Confirm Password</label>

            <input
              type="password"
              id="confirmPassword"
              placeholder="Confirm password"
            >

          </div>
          <!-- =========================
DIVIDER
========================= -->

<div class="divider">

  <span>OR</span>

</div>

<!-- =========================
GOOGLE LOGIN BUTTON
========================= -->

<button
  type="button"
  class="google-btn"
>

  <img
    src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg?utm_source=chatgpt.com"
    alt="Google Logo"
  >

  Continue with Google

          </button>

          <!-- BUTTON -->

          <button type="submit" class="register-btn">
            Create Account
          </button>

          <!-- LOGIN -->

          <p class="login-text">
            Already have an account?
            <a href="#">Login</a>
          </p>

        </form>

      </div>

    </div>

  </section>

  <!-- JAVASCRIPT -->
  <script src="register.js"></script>

</body>

</html>
