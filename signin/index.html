<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Taxease Registration</title>

  <!-- CSS -->

  <link rel="stylesheet" href="signin.css" />

  <!-- GOOGLE FONT -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <section class="register-section">
    <div class="register-container">

```
  <!-- LEFT SIDE -->
  <div class="register-left">
    <div class="logo-area">
      <img
        src="https://res.cloudinary.com/dmtbsxz67/image/upload/v1780010677/Screenshot_20260528_235724_Figma_zqpyn9.jpg"
        alt="Taxease Logo"
      />
      <h1>Taxease</h1>
    </div>

    <h2>Create Your Account</h2>

    <p>
      Join Taxease and start calculating and managing your taxes easily
      and securely.
    </p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="register-right">
    <form id="registerForm">

      <h2>Create Account</h2>

      <!-- FULL NAME -->
      <div class="input-group">
        <label for="fullName">Full Name</label>
        <input
          type="text"
          id="fullName"
          placeholder="Enter your full name"
          required
        />
      </div>

      <!-- EMAIL -->
      <div class="input-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <!-- PHONE -->
      <div class="input-group">
        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          placeholder="Enter your phone number"
          required
        />
      </div>

      <!-- PASSWORD -->
      <div class="input-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter password"
          required
        />
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm password"
          required
        />

        <small id="passwordError"></small>
      </div>

      <!-- DIVIDER -->
      <div class="divider">
        <span>OR</span>
      </div>

      <!-- GOOGLE SIGN IN -->
      <div id="google-signin-button"></div>

      <!-- CREATE ACCOUNT BUTTON -->
      <button
        type="submit"
        id="createAccountBtn"
        class="signin-btn"
      >
        Create Account
      </button>

      <!-- LOGIN LINK -->
      <p class="login-text">
        Already have an account?
        <a href="login/index.html">Login</a>
      </p>

    </form>
  </div>

</div>
```

  </section>

  <script

  <!-- JAVASCRIPT -->

  <script src="signin.js"></script>

</body>
</html>
